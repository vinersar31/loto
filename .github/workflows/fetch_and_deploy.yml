name: Fetch Loto Results and Deploy

on:
  push:
    branches:
      - main
      - bench
  schedule:
    # Run at 21:00 UTC on Thursdays and Sundays
    - cron: '0 21 * * 4,0'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scripts/scrape_results.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add next-loto-app/public/data/results.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update latest loto results"
          git remote update
          git rebase origin/${GITHUB_REF##*/} || true
          git push origin HEAD || true # To avoid bash restriction

  build-and-deploy:
    needs: scrape-and-update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'next-loto-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./next-loto-app
        run: npm ci

      - name: Build with Next.js
        working-directory: ./next-loto-app
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./next-loto-app/out
          publish_branch: gh-pages
          commit_message: "deploy: updates to gh-pages branch"
